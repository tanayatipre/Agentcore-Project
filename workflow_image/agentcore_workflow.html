<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentCore FAQ Assistant - Workflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f8fb;
    --card: #ffffff;
    --border: #cfd6e6;
    --text: #1f2937;
    --muted: #6b7280;
    --arrow: #8a94a6;
    --radius: 18px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  .wrapper {
    width: 100%;
    max-width: 1100px;
  }

  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 8px 0 12px;
  }

  .flow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
    flex-wrap: nowrap;
    padding: 12px 4px;
  }

  .node {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    width: 130px;
  }

  .icon-wrap {
    width: 96px;
    height: 96px;
    border-radius: var(--radius);
    background: var(--card);
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .icon-wrap img {
    width: 74px;
    height: 74px;
    object-fit: contain;
    display: block;
  }

  .node-label {
    margin-top: 10px;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    line-height: 1.3;
    width: 100%;
  }

  .node-sub {
    margin-top: 4px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.3;
    font-weight: 400;
  }

  .connector {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    padding: 0;
  }

  .connector svg {
    width: 34px;
    height: 16px;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="section-title">Build-time</div>
  <div class="flow">
    <div class="node" data-type="data">
      <div class="icon-wrap">
        <img src="dataset_logo.png" alt="FAQ dataset">
      </div>
      <div class="node-label">FAQ dataset</div>
      <div class="node-sub">jio_faq.csv</div>
    </div>

    <div class="connector">
      <svg viewBox="0 0 36 18" fill="none">
        <line x1="2" y1="9" x2="28" y2="9" stroke="#8a94a6" stroke-width="1.8"/>
        <polyline points="22,4 29,9 22,14" stroke="#8a94a6" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="node" data-type="aws">
      <div class="icon-wrap">
        <img src="bedrock_logo.png" alt="Amazon Bedrock">
      </div>
      <div class="node-label">Amazon Bedrock</div>
      <div class="node-sub">Titan embed v2</div>
    </div>

    <div class="connector">
      <svg viewBox="0 0 36 18" fill="none">
        <line x1="2" y1="9" x2="28" y2="9" stroke="#8a94a6" stroke-width="1.8"/>
        <polyline points="22,4 29,9 22,14" stroke="#8a94a6" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="node" data-type="store">
      <div class="icon-wrap">
        <img src="faiss_logo.png" alt="FAISS index">
      </div>
      <div class="node-label">FAISS index</div>
      <div class="node-sub">Vector store</div>
    </div>
  </div>

  <div class="section-title">Runtime</div>
  <div class="flow">
    <div class="node" data-type="ui">
      <div class="icon-wrap">
        <img src="Streamlit_logo.png" alt="Streamlit UI">
      </div>
      <div class="node-label">Streamlit / Client</div>
      <div class="node-sub">HTTP request</div>
    </div>

    <div class="connector">
      <svg viewBox="0 0 36 18" fill="none">
        <line x1="2" y1="9" x2="28" y2="9" stroke="#8a94a6" stroke-width="1.8"/>
        <polyline points="22,4 29,9 22,14" stroke="#8a94a6" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="node" data-type="agent">
      <div class="icon-wrap">
        <img src="agentcore_logo.jfif" alt="AgentCore">
      </div>
      <div class="node-label">AgentCore</div>
      <div class="node-sub">LangGraph agent</div>
    </div>

    <div class="connector">
      <svg viewBox="0 0 36 18" fill="none">
        <line x1="2" y1="9" x2="28" y2="9" stroke="#8a94a6" stroke-width="1.8"/>
        <polyline points="22,4 29,9 22,14" stroke="#8a94a6" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="node" data-type="store">
      <div class="icon-wrap">
        <img src="faiss_logo.png" alt="FAISS index">
      </div>
      <div class="node-label">FAISS</div>
      <div class="node-sub">Retrieve</div>
    </div>

    <div class="connector">
      <svg viewBox="0 0 36 18" fill="none">
        <line x1="2" y1="9" x2="28" y2="9" stroke="#8a94a6" stroke-width="1.8"/>
        <polyline points="22,4 29,9 22,14" stroke="#8a94a6" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="node" data-type="llm">
      <div class="icon-wrap">
        <img src="groq_logo.png" alt="Groq LLM">
      </div>
      <div class="node-label">Groq LLM</div>
      <div class="node-sub">via LangChain</div>
    </div>

    <div class="connector">
      <svg viewBox="0 0 36 18" fill="none">
        <line x1="2" y1="9" x2="28" y2="9" stroke="#8a94a6" stroke-width="1.8"/>
        <polyline points="22,4 29,9 22,14" stroke="#8a94a6" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="node" data-type="ui">
      <div class="icon-wrap">
        <img src="response_logo.png" alt="Response">
      </div>
      <div class="node-label">Response</div>
      <div class="node-sub">Streamlit / HTTPS</div>
    </div>
  </div>
</div>

</body>
</html>
